<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="side-panel-modes" content="panel">
  <style>
    :root {
      --token-accent: #3182F6;
      --token-fontSize: 15px;
      --token-density: comfy;
      --token-round: soft;
      --token-theme: light;
      color-scheme: light;
      font-family: Pretendard Variable, Pretendard, -apple-system, system-ui, sans-serif;
    }
    [data-theme="light"] { --token-theme: light; }
    [data-theme="dark"] { --token-theme: dark; color-scheme: dark; }
    html, body { margin: 0; }
    .side-panel-shell { width: min(100%, 372px); max-width: 100%; margin: 0 auto; }
    section, header, footer { box-sizing: border-box; padding: 12px; }
    .wide-runtime-row { width: 900px; height: 24px; background: var(--token-accent); }
  </style>
</head>
<body>
  <main class="side-panel-shell" data-theme="light" id="app"></main>
  <script>
    fetch('/api/lesson-panel').then(response => response.json()).then(payload => {
      document.querySelector('#app').innerHTML = `
        <header><h1>${payload.title}</h1></header>
        <section>${JSON.stringify(payload.sections)}</section>
        <div class="wide-runtime-row">runtime overflow</div>
      `;
    });
  </script>
</body>
</html>
